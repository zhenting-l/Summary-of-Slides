name: Release APK

on:
  push:
    branches:
      - main
    paths:
      - "gradle.properties"
      - ".github/workflows/android-apk.yml"
      - "scripts/publish-latest-apk.mjs"
      - "app/build.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
  workflow_dispatch:

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Decode release keystore
        run: |
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 -d > "${{ github.workspace }}/release.jks"

      - name: Build release APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign release APK
        run: |
          set -euo pipefail
          RELEASE_DIR="app/build/outputs/apk/release"
          UNSIGNED_APK="${RELEASE_DIR}/app-release-unsigned.apk"
          ALIGNED_APK="${RELEASE_DIR}/app-release-aligned.apk"
          SIGNED_APK="${RELEASE_DIR}/app-release.apk"
          BUILD_TOOLS_DIR="$(find "${ANDROID_HOME}/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"

          test -f "${UNSIGNED_APK}"
          test -x "${BUILD_TOOLS_DIR}/zipalign"
          test -x "${BUILD_TOOLS_DIR}/apksigner"

          "${BUILD_TOOLS_DIR}/zipalign" -f -p 4 "${UNSIGNED_APK}" "${ALIGNED_APK}"
          "${BUILD_TOOLS_DIR}/apksigner" sign \
            --ks "${{ github.workspace }}/release.jks" \
            --ks-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
            --ks-key-alias "${ANDROID_KEY_ALIAS}" \
            --key-pass "pass:${ANDROID_KEY_PASSWORD}" \
            --out "${SIGNED_APK}" \
            "${ALIGNED_APK}"

          "${BUILD_TOOLS_DIR}/apksigner" verify --print-certs "${SIGNED_APK}"
          ls -lah "${RELEASE_DIR}"
          test -f "${SIGNED_APK}"

      - name: Publish GitHub Release APK
        run: node scripts/publish-latest-apk.mjs
