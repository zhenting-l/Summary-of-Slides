name: Build APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    permissions:
      contents: write
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Decode release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 -d > ${{ github.workspace }}/release.jks

      - name: Read version metadata
        shell: bash
        run: |
          VERSION_NAME=$(grep -E '^APP_VERSION_NAME=' gradle.properties | cut -d= -f2)
          VERSION_CODE=$(grep -E '^APP_VERSION_CODE=' gradle.properties | cut -d= -f2)
          echo "APP_VERSION_NAME=${VERSION_NAME}" >> $GITHUB_ENV
          echo "APP_VERSION_CODE=${VERSION_CODE}" >> $GITHUB_ENV
          echo "RELEASE_APK_NAME=Summary-of-Slides-v${VERSION_NAME}.apk" >> $GITHUB_ENV
          echo "DEBUG_APK_NAME=Summary-of-Slides-debug-v${VERSION_NAME}.apk" >> $GITHUB_ENV

      - name: Build Release APK (signed)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release.jks
          RELEASE_STORE_PASSWORD: ${{ env.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ env.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ env.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon
          cp app/build/outputs/apk/release/app-release.apk "${RELEASE_APK_NAME}"

      - name: Upload APK (release)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-v${{ env.APP_VERSION_NAME }}
          path: ${{ env.RELEASE_APK_NAME }}

      - name: Publish GitHub Release (release APK)
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && (github.ref_name == 'main' || github.ref_name == 'master' || github.event_name == 'workflow_dispatch') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.APP_VERSION_NAME }}
          name: v${{ env.APP_VERSION_NAME }}
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          generate_release_notes: true
          overwrite_files: true
          files: ${{ env.RELEASE_APK_NAME }}
