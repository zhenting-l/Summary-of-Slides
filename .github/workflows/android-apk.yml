name: Release APK

on:
  push:
    branches:
      - main
    paths:
      - "gradle.properties"
      - ".github/workflows/android-apk.yml"
      - "scripts/publish-latest-apk.mjs"
      - "app/build.gradle.kts"
      - "gradle/**"
      - "gradlew"
      - "gradlew.bat"
  workflow_dispatch:

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Decode release keystore
        run: |
          printf '%s' "${ANDROID_KEYSTORE_BASE64}" | base64 -d > "${{ github.workspace }}/release.jks"

      - name: Build signed release APK
        env:
          RELEASE_STORE_FILE: ${{ github.workspace }}/release.jks
          RELEASE_STORE_PASSWORD: ${{ env.ANDROID_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ env.ANDROID_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ env.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Publish GitHub Release APK
        run: node scripts/publish-latest-apk.mjs
